{% extends "base.html" %}
{% block title %}Entrada PS{% endblock %}
{% block page_title %}Registrar Entrada — Pronto-Socorro{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('ps.painel') }}" class="btn btn-secondary">Voltar</a>
{% endblock %}
{% block content %}
<div style="max-width:600px">
<form method="POST">
  <div class="card">
    <div class="card-header"><h3>Dados de Entrada</h3></div>
    <div class="card-body">
      <div class="form-grid form-grid-2">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Paciente <span class="obrigatorio">*</span></label>
          <select name="paciente_id" class="form-control" required>
            <option value="">— Selecione —</option>
            {% for p in pacientes %}
            <option value="{{ p.id }}">{{ p.nome_exibicao }} — {{ p.cns or p.cpf or 'sem doc.' }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Modo de chegada</label>
          <select name="modo_chegada" class="form-control">
            {% for val, lbl in [('espontaneo','Espontâneo'),('samu','SAMU'),
              ('viatura','Viatura policial'),('transferencia','Transferência'),('outros','Outros')] %}
            <option value="{{ val }}">{{ lbl }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Classificação de risco</label>
          <select name="classificacao" class="form-control">
            {% for val, lbl in [('verde','Verde — Pouco urgente'),('amarelo','Amarelo — Urgente'),
              ('laranja','Laranja — Muito urgente'),('vermelho','Vermelho — Emergência'),
              ('azul','Azul — Não urgente')] %}
            <option value="{{ val }}">{{ lbl }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Queixa principal</label>
          <input type="text" name="queixa_principal" class="form-control"
                 placeholder="Ex: Dor torácica há 2h, dispneia, febre...">
        </div>
      </div>
    </div>
    <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
      <a href="{{ url_for('ps.painel') }}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary btn-lg">Registrar Entrada</button>
    </div>
  </div>
</form>
</div>
{% endblock %}
