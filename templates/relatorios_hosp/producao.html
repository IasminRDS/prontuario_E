{% extends "base.html" %}
{% block title %}Produção Hospitalar{% endblock %}
{% block page_title %}Produção Hospitalar{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('rel_hosp.index') }}" class="btn btn-secondary">Voltar</a>
  <a href="{{ request.url }}&exportar=csv" class="btn btn-secondary">Exportar CSV</a>
{% endblock %}
{% block content %}
<form method="GET" class="card mb-20">
  <div class="card-body" style="display:flex;gap:14px;align-items:flex-end">
    <div class="form-group"><label class="form-label">Data inicial</label>
      <input type="date" name="data_ini" class="form-control" value="{{ data_ini }}"></div>
    <div class="form-group"><label class="form-label">Data final</label>
      <input type="date" name="data_fim" class="form-control" value="{{ data_fim }}"></div>
    <button type="submit" class="btn btn-primary">Gerar</button>
  </div>
</form>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px">
  {% for label, valor in dados %}
  <div class="stat-card" style="border-left:4px solid var(--sus-azul)">
    <div class="stat-label">{{ label }}</div>
    <div class="stat-value">{{ valor }}</div>
  </div>{% endfor %}
</div>
{% endblock %}
