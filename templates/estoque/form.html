{% extends "base.html" %}
{% block title %}Novo Item{% endblock %}
{% block page_title %}Cadastrar Item no Estoque{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('estoque.index') }}" class="btn btn-secondary">Voltar</a>
{% endblock %}
{% block content %}
<div style="max-width:620px">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card">
      <div class="card-header"><h3>Dados do Item</h3></div>
      <div class="card-body">
        <div class="form-grid form-grid-2">
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Nome <span class="obrigatorio">*</span></label>
            <input type="text" name="nome" class="form-control" required placeholder="Ex: Paracetamol 500mg, Soro fisiológico 500mL">
          </div>
          <div class="form-group">
            <label class="form-label">Categoria</label>
            <select name="categoria" class="form-control">
              {% for val, lbl in [('medicamento','Medicamento'),('material','Material'),('opme','OPME'),('dietetico','Dietético'),('outro','Outro')] %}
              <option value="{{ val }}">{{ lbl }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Apresentação</label>
            <input type="text" name="apresentacao" class="form-control" placeholder="Ex: comp. 500mg, frasco 100mL">
          </div>
          <div class="form-group">
            <label class="form-label">Unidade de medida</label>
            <select name="unidade_medida" class="form-control">
              {% for v in ['un','cx','frasco','ampola','bisnaga','kg','g','L','mL'] %}
              <option value="{{ v }}">{{ v }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Código interno</label>
            <input type="text" name="codigo_interno" class="form-control font-mono" placeholder="001">
          </div>
          <div class="form-group">
            <label class="form-label">Quantidade inicial</label>
            <input type="number" name="quantidade" class="form-control" value="0" min="0" step="any">
          </div>
          <div class="form-group">
            <label class="form-label">Estoque mínimo <span class="obrigatorio">*</span></label>
            <input type="number" name="estoque_minimo" class="form-control" value="10" min="0" step="any" required>
          </div>
          <div class="form-group">
            <label class="form-label">Estoque máximo</label>
            <input type="number" name="estoque_maximo" class="form-control" min="0" step="any">
          </div>
          <div class="form-group">
            <label class="form-label">Lote</label>
            <input type="text" name="lote_atual" class="form-control font-mono" placeholder="LOT20251001">
          </div>
          <div class="form-group">
            <label class="form-label">Validade</label>
            <input type="date" name="validade" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Preço unitário (R$)</label>
            <input type="number" name="preco_unitario" class="form-control" min="0" step="0.01">
          </div>
        </div>
      </div>
      <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
        <a href="{{ url_for('estoque.index') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
