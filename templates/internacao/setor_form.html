{% extends "base.html" %}
{% block title %}Novo Setor{% endblock %}
{% block page_title %}Cadastrar Setor{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('internacao.leitos') }}" class="btn btn-secondary">Voltar</a>
{% endblock %}

{% block content %}
<div style="max-width:520px">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card">
      <div class="card-header"><h3>Dados do Setor</h3></div>
      <div class="card-body">
        <div class="form-grid form-grid-2">
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Nome <span class="obrigatorio">*</span></label>
            <input type="text" name="nome" class="form-control" required
                   placeholder="Ex: Clínica Médica, UTI Adulto, Pediatria">
          </div>
          <div class="form-group">
            <label class="form-label">Sigla</label>
            <input type="text" name="sigla" class="form-control font-mono"
                   placeholder="CM, UTI, PED" maxlength="10">
          </div>
          <div class="form-group">
            <label class="form-label">Tipo</label>
            <select name="tipo" class="form-control">
              {% for val, lbl in [('enfermaria','Enfermaria'),('uti','UTI'),
                ('semi_intensivo','Semi-intensivo'),('ps','Pronto-socorro'),
                ('cirurgia','Centro cirúrgico'),('recuperacao','Recuperação'),
                ('isolamento','Isolamento')] %}
              <option value="{{ val }}">{{ lbl }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Andar</label>
            <input type="text" name="andar" class="form-control" placeholder="Ex: 2º andar, Térreo">
          </div>
          <div class="form-group">
            <label class="form-label">Responsável</label>
            <input type="text" name="responsavel" class="form-control" placeholder="Médico responsável">
          </div>
          <div class="form-group">
            <label class="form-label">Criar leitos automaticamente</label>
            <input type="number" name="qtd_leitos" class="form-control"
                   value="0" min="0" max="100" placeholder="Quantidade">
            <span class="form-hint">Serão criados como SIGLA-01, SIGLA-02...</span>
          </div>
          <div class="form-group">
            <label class="form-label">Tipo dos leitos</label>
            <select name="tipo_leito" class="form-control">
              <option value="comum">Comum</option>
              <option value="uti">UTI</option>
              <option value="isolamento">Isolamento</option>
            </select>
          </div>
        </div>
      </div>
      <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
        <a href="{{ url_for('internacao.leitos') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">Criar Setor</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
