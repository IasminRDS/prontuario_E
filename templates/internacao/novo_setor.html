{% extends "base.html" %} {% block title %}Novo Setor{% endblock %} {% block
page_title %}Novo Setor{% endblock %} {% block content %}
<div class="card" style="max-width: 720px">
  <div class="card-body">
    <h3 style="margin-top: 0">Cadastrar Setor</h3>

    <form method="post" action="{{ url_for('internacao.novo_setor') }}">
      <div style="margin-bottom: 12px">
        <label for="nome" class="form-label">Nome do Setor</label>
        <input
          id="nome"
          name="nome"
          type="text"
          class="form-control"
          required
          placeholder="Ex.: Clínica Médica"
        />
      </div>

      <div style="margin-bottom: 16px">
        <label for="unidade_id" class="form-label">Unidade</label>
        <select id="unidade_id" name="unidade_id" class="form-control">
          <option value="">Selecione</option>
          {% for u in unidades %}
          <option value="{{ u.id }}">{{ u.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div style="display: flex; gap: 8px">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{{ url_for('internacao.leitos') }}" class="btn btn-secondary"
          >Voltar</a
        >
      </div>
    </form>
  </div>
</div>
{% endblock %}
