{% extends "base.html" %}
{% block title %}Novo Medicamento{% endblock %}
{% block page_title %}Cadastrar Medicamento{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('medicamentos.catalogo') }}" class="btn btn-secondary">Voltar</a>
{% endblock %}

{% block content %}
<div style="max-width:580px">
  <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card">
      <div class="card-header"><h3>Dados do Medicamento</h3></div>
      <div class="card-body">
        <div class="form-grid form-grid-2">
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Nome genérico (DCB) <span class="obrigatorio">*</span></label>
            <input type="text" name="nome_generico" class="form-control" required
                   placeholder="Ex: Paracetamol">
          </div>
          <div class="form-group">
            <label class="form-label">Nome comercial</label>
            <input type="text" name="nome_comercial" class="form-control"
                   placeholder="Ex: Tylenol">
          </div>
          <div class="form-group">
            <label class="form-label">Classe terapêutica</label>
            <input type="text" name="classe" class="form-control"
                   placeholder="Ex: Analgésico, Anti-hipertensivo">
          </div>
          <div class="form-group">
            <label class="form-label">Apresentação</label>
            <input type="text" name="apresentacao" class="form-control"
                   placeholder="Ex: Comp. 500mg, Sol. oral 200mg/mL">
          </div>
          <div class="form-group">
            <label class="form-label">Via de administração</label>
            <select name="via_admin" class="form-control">
              <option value="">—</option>
              {% for v in ['Oral','EV','IM','SC','Tópico','Inalatório','Sublingual','Retal','Oftálmico','Nasal'] %}
              <option value="{{ v }}">{{ v }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Lista RENAME (se controlado)</label>
            <input type="text" name="lista_rename" class="form-control font-mono"
                   placeholder="Ex: A1, B1, C1" maxlength="5">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label flex-center gap-8" style="cursor:pointer">
              <input type="checkbox" name="controlado" style="width:16px;height:16px">
              Medicamento controlado (sujeito a notificação de receita)
            </label>
          </div>
        </div>
      </div>
      <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
        <a href="{{ url_for('medicamentos.catalogo') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
