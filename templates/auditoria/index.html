{% extends "base.html" %}
{% block title %}Log de Auditoria{% endblock %}
{% block page_title %}Log de Auditoria{% endblock %}
{% block content %}
<div class="card" style="max-width:1100px;margin:0 auto;">
  <div class="card-body">
    <table class="tabela">
      <thead><tr><th>Quando</th><th>Usuário</th><th>Ação</th><th>Módulo</th></tr></thead>
      <tbody>
        {% for l in logs %}
        <tr><td>{{ l.quando }}</td><td>{{ l.usuario }}</td><td>{{ l.acao }}</td><td>{{ l.modulo }}</td></tr>
        {% else %}
        <tr><td colspan="4" class="text-muted">Sem logs.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
