{% extends "base.html" %}
{% block title %}Nova Vacina{% endblock %}
{% block page_title %}Cadastrar Vacina{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('vacinas.catalogo') }}" class="btn btn-secondary">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
    </svg>
    Voltar
  </a>
{% endblock %}

{% block content %}
<div style="max-width:580px">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card">
      <div class="card-header">
        <h3>Dados da Vacina</h3>
      </div>
      <div class="card-body">
        <div class="form-grid form-grid-2">
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Nome completo <span class="obrigatorio">*</span></label>
            <input type="text" name="nome" class="form-control" required
                   placeholder="Ex: Vacina contra Hepatite B">
          </div>
          <div class="form-group">
            <label class="form-label">Sigla</label>
            <input type="text" name="sigla" class="form-control font-mono"
                   placeholder="HepB" maxlength="20">
          </div>
          <div class="form-group">
            <label class="form-label">Fabricante</label>
            <input type="text" name="fabricante" class="form-control"
                   placeholder="Ex: Butantan">
          </div>
          <div class="form-group">
            <label class="form-label">Total de doses <span class="obrigatorio">*</span></label>
            <input type="number" name="doses_total" class="form-control"
                   value="1" min="1" max="20" required>
          </div>
          <div class="form-group">
            <label class="form-label">Intervalo entre doses (dias)</label>
            <input type="number" name="intervalo_dias" class="form-control"
                   placeholder="Ex: 30">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Descrição</label>
            <textarea name="descricao" class="form-control" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
        <a href="{{ url_for('vacinas.catalogo') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
