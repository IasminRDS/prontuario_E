{% extends "base.html" %}
{% block title %}Mapa de Vagas - Estadual{% endblock %}
{% block page_title %}Mapa de Vagas em Tempo Real{% endblock %}
{% block topbar_actions %}
  <select id="filtro-tipo" class="form-control" style="width:150px">
    <option value="">Todos os tipos</option>
    <option value="clinico">Clínico</option>
    <option value="cirurgico">Cirúrgico</option>
    <option value="critico">Crítico</option>
  </select>
  <button class="btn btn-primary" onclick="atualizarMapa()">Atualizar</button>
{% endblock %}
{% block content %}

<!-- MAPA -->
<div class="card">
  <div class="card-header">
    <h3>Distribuição de Vagas</h3>
  </div>
  <div class="card-body">
    <div id="mapa" style="height:600px;border-radius:8px;overflow:hidden"></div>
  </div>
</div>

<!-- LEGENDA -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:20px">
  <div class="card">
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:20px;height:20px;border-radius:50%;background:#007C3E"></div>
        <span>Vagas Disponíveis</span>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:20px;height:20px;border-radius:50%;background:#D4A625"></div>
        <span>Vagas Reservadas</span>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:20px;height:20px;border-radius:50%;background:#DC2626"></div>
        <span>Ocupação Crítica</span>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script>
let map = L.map('mapa').setView([-14.235, -51.925], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19
}).addTo(map);

let markers = {};

async function atualizarMapa() {
  const tipo = document.getElementById('filtro-tipo').value;
  
  try {
    const resp = await fetch(`/api/vagas/disponiveis?tipo_paciente=${tipo}`);
    const data = await resp.json();
    
    // Limpar markers antigos
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};
    
    // Adicionar novos markers
    data.vagas.forEach(vaga => {
      const cor = vaga.status === 'disponivel' ? '#007C3E' :
                  vaga.status === 'reservada' ? '#D4A625' : '#DC2626';
      
      const marker = L.circleMarker([vaga.lat || -14.235, vaga.lng || -51.925], {
        radius: 8,
        fillColor: cor,
        fillOpacity: 0.8,
        color: '#fff',
        weight: 2
      }).addTo(map);
      
      marker.bindPopup(`<strong>${vaga.unidade}</strong><br>${vaga.setor}<br>Status: ${vaga.status}`);
      
      markers[vaga.id] = marker;
    });
  } catch (erro) {
    console.error('Erro ao atualizar mapa:', erro);
  }
}

document.getElementById('filtro-tipo').addEventListener('change', atualizarMapa);
atualizarMapa();
setInterval(atualizarMapa, 60000); // Atualizar a cada minuto
</script>
{% endblock %}
