{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Ferramentas de PDF</h2>
    <p>Compacte ou adicione senhas aos seus documentos médicos.</p>

    <div class="card shadow-sm p-4">
        <form action="{{ url_for('pdf.processar_pdf') }}" method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label class="form-label fw-bold">1. Selecione o arquivo PDF</label>
                <input type="file" name="documento" class="form-control" accept="application/pdf" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">2. O que deseja fazer?</label>
                <select name="acao" id="acao" class="form-select" onchange="mostrarOpcoes()" required>
                    <option value="" disabled selected>Escolha uma opção...</option>
                    <option value="compactar">Compactar PDF (Reduzir Tamanho)</option>
                    <option value="proteger">Proteger com Senha</option>
                </select>
            </div>

            <div id="opcoes_compactar" class="mb-3 p-3 bg-light border rounded d-none">
                <label class="form-label">Nível de Compactação:</label>
                <select name="nivel_compactacao" class="form-select">
                    <option value="baixo">Baixo (Alta Qualidade)</option>
                    <option value="medio" selected>Médio (Recomendado)</option>
                    <option value="alto">Alto (Baixa Qualidade, menor tamanho)</option>
                </select>
            </div>

            <div id="opcoes_proteger" class="mb-3 p-3 bg-light border rounded d-none">
                <div class="mb-2">
                    <label class="form-label">Senha para abrir o PDF:</label>
                    <input type="password" name="senha_pdf" class="form-control" placeholder="Digite uma senha forte">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="permitir_impressao" value="sim" id="checkImpressao">
                    <label class="form-check-label" for="checkImpressao">
                        Permitir que o usuário imprima o documento
                    </label>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">3. Nome do arquivo final (opcional)</label>
                <input type="text" name="nome_final" class="form-control" placeholder="documento_processado">
            </div>

            <button type="submit" class="btn btn-primary w-100">Processar e Baixar PDF</button>
        </form>
    </div>
</div>

<script>
function mostrarOpcoes() {
    let acao = document.getElementById("acao").value;
    document.getElementById("opcoes_compactar").classList.add("d-none");
    document.getElementById("opcoes_proteger").classList.add("d-none");
    
    if (acao === "compactar") {
        document.getElementById("opcoes_compactar").classList.remove("d-none");
    } else if (acao === "proteger") {
        document.getElementById("opcoes_proteger").classList.remove("d-none");
    }
}
</script>
{% endblock %}
