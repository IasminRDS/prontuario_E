{% extends "base.html" %} {% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<div class="container mt-4">
  <h2>Reorganizar e Excluir Páginas</h2>
  <p>
    Selecione um PDF, arraste as páginas para mudar a ordem ou clique no "X"
    para apagar.
  </p>

  <div class="card shadow-sm p-4 mb-4">
    <form
      id="pdfForm"
      action="{{ url_for('pdf.reorganizar') }}"
      method="POST"
      enctype="multipart/form-data"
    >
      <div class="mb-3">
        <input
          type="file"
          id="fileInput"
          name="documento"
          class="form-control"
          accept="application/pdf"
          required
        />
      </div>

      <input type="hidden" name="ordem_paginas" id="ordemPaginasInput" />

      <div id="pagesGrid" class="row g-3 mt-3"></div>

      <button
        type="submit"
        id="btnSalvar"
        class="btn btn-success w-100 mt-4 d-none"
      >
        Salvar Novo PDF
      </button>
    </form>
  </div>
</div>

<style>
  .pdf-page-wrapper {
    position: relative;
    cursor: grab;
  }
  .pdf-page-wrapper canvas {
    width: 100%;
    border: 1px solid #ccc;
    box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
    border-radius: 5px;
  }
  .delete-btn {
    position: absolute;
    top: -10px;
    right: -10px;
    background: red;
    color: white;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-weight: bold;
  }
  .page-number {
    text-align: center;
    font-weight: bold;
    margin-top: 5px;
  }
</style>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

  const fileInput = document.getElementById("fileInput");
  const pagesGrid = document.getElementById("pagesGrid");
  const btnSalvar = document.getElementById("btnSalvar");
  const ordemPaginasInput = document.getElementById("ordemPaginasInput");

  fileInput.addEventListener("change", function (e) {
    const file = e.target.files[0];
    if (!file || file.type !== "application/pdf") return;

    const fileReader = new FileReader();
    fileReader.onload = function () {
      const typedarray = new Uint8Array(this.result);

      pdfjsLib.getDocument(typedarray).promise.then((pdf) => {
        pagesGrid.innerHTML = "";
        btnSalvar.classList.remove("d-none");

        for (let i = 1; i <= pdf.numPages; i++) {
          pdf.getPage(i).then((page) => {
            const viewport = page.getViewport({ scale: 0.5 });

            const wrapper = document.createElement("div");
            wrapper.className = "col-6 col-md-3 pdf-page-wrapper";
            wrapper.dataset.pageIndex = i - 1; // Python começa do 0

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const deleteBtn = document.createElement("button");
            deleteBtn.className = "delete-btn";
            deleteBtn.innerHTML = "X";
            deleteBtn.type = "button"; // Evita enviar o formulário acidentalmente
            deleteBtn.onclick = function () {
              wrapper.remove();
              atualizarOrdem();
            };

            const label = document.createElement("div");
            label.className = "page-number";
            label.innerText = `Pág. ${i}`;

            wrapper.appendChild(canvas);
            wrapper.appendChild(deleteBtn);
            wrapper.appendChild(label);

            page.render({ canvasContext: context, viewport: viewport });

            setTimeout(() => {
              pagesGrid.appendChild(wrapper);
              atualizarOrdem();
            }, i * 50);
          });
        }
      });
    };
    fileReader.readAsArrayBuffer(file);
  });

  new Sortable(pagesGrid, {
    animation: 150,
    ghostClass: "bg-light",
    onEnd: function () {
      atualizarOrdem();
    },
  });

  function atualizarOrdem() {
    const paginas = document.querySelectorAll(".pdf-page-wrapper");
    let ordem = [];
    paginas.forEach((p) => {
      ordem.push(p.dataset.pageIndex);
    });
    ordemPaginasInput.value = ordem.join(",");
  }

  document.getElementById("pdfForm").addEventListener("submit", function (e) {
    if (ordemPaginasInput.value === "") {
      e.preventDefault();
      alert("O PDF precisa ter pelo menos 1 página!");
    }
  });
</script>
{% endblock %}
