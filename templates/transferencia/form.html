{% extends "base.html" %}
{% block title %}Nova Transferência{% endblock %}
{% block page_title %}Solicitar Transferência{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('transferencia.index') }}" class="btn btn-secondary">Voltar</a>
{% endblock %}
{% block content %}
<div style="max-width:700px">
<form method="POST">
  <div class="card">
    <div class="card-header"><h3>Dados da Transferência</h3></div>
    <div class="card-body">
      <div class="form-grid form-grid-2">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Paciente <span class="obrigatorio">*</span></label>
          <select name="paciente_id" class="form-control" required>
            <option value="">— Selecione —</option>
            {% for p in pacientes %}
            <option value="{{ p.id }}" {% if pac_sel and pac_sel.id==p.id %}selected{% endif %}>
              {{ p.nome_exibicao }}
            </option>
            {% endfor %}
          </select>
        </div>
        {% if internacoes %}
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Internação vinculada</label>
          <select name="internacao_id" class="form-control">
            <option value="">— Não vincular —</option>
            {% for i in internacoes %}
            <option value="{{ i.id }}">Internação #{{ i.id }} — Leito {{ i.leito.numero }}</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Unidade destino <span class="obrigatorio">*</span></label>
          <select name="unidade_destino_id" class="form-control" required>
            <option value="">— Selecione a unidade —</option>
            {% for u in unidades %}
            <option value="{{ u.id }}">{{ u.nome }} — {{ u.municipio or '' }}/{{ u.uf or '' }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Prioridade</label>
          <select name="prioridade" class="form-control">
            {% for v, l in [('eletiva','Eletiva'),('urgente','Urgente'),('emergencia','Emergência')] %}
            <option value="{{ v }}">{{ l }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Condição de transporte</label>
          <select name="condicao_transporte" class="form-control">
            <option value="">— A definir —</option>
            {% for v, l in [('maca','Maca'),('cadeira','Cadeira de rodas'),('ambulatorio','Ambulatório'),('uti_movel','UTI móvel'),('helicoptero','Helicóptero')] %}
            <option value="{{ v }}">{{ l }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">CID-10</label>
          <input type="text" name="cid" class="form-control font-mono" placeholder="Ex: J18.9" maxlength="10" style="text-transform:uppercase">
        </div>
        <div class="form-group">
          <label class="form-label">Data/hora prevista</label>
          <input type="datetime-local" name="data_prevista" class="form-control">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Motivo da transferência <span class="obrigatorio">*</span></label>
          <textarea name="motivo" class="form-control" rows="3" required></textarea>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Resumo clínico</label>
          <textarea name="resumo_clinico" class="form-control" rows="4"
                    placeholder="Diagnóstico, evolução, medicamentos em uso, exames recentes..."></textarea>
        </div>
      </div>
    </div>
    <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
      <a href="{{ url_for('transferencia.index') }}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary">Solicitar Transferência</button>
    </div>
  </div>
</form>
</div>
{% endblock %}
