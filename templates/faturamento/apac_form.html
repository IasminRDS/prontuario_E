{% extends "base.html" %}
{% block title %}Nova APAC{% endblock %}
{% block page_title %}Nova APAC{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('faturamento.apac_lista') }}" class="btn btn-secondary">Voltar</a>{% endblock %}
{% block content %}
<div style="max-width:620px">
<form method="POST"> 
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <div class="card-header"><h3>Dados da APAC</h3></div>
    <div class="card-body">
      <div class="form-grid form-grid-2">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Paciente <span class="obrigatorio">*</span></label>
          <select name="paciente_id" class="form-control" required>
            <option value="">— Selecione —</option>
            {% for p in pacientes %}<option value="{{ p.id }}">{{ p.nome_exibicao }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select name="tipo" class="form-control">
            {% for v, l in [('inicial','Inicial'),('continuidade','Continuidade'),('unica','Única')] %}
            <option value="{{ v }}">{{ l }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Procedimento (SIGTAP)</label>
          <input type="text" name="procedimento" class="form-control font-mono" placeholder="0304010030">
        </div>
        <div class="form-group">
          <label class="form-label">CID-10</label>
          <input type="text" name="cid" class="form-control font-mono" placeholder="C50.9" maxlength="10" style="text-transform:uppercase">
        </div>
        <div class="form-group">
          <label class="form-label">Competência (AAAA/MM)</label>
          <input type="text" name="competencia" class="form-control font-mono" value="{{ comp_atual }}">
        </div>
        <div class="form-group">
          <label class="form-label">Data início</label>
          <input type="date" name="data_inicio" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Data fim</label>
          <input type="date" name="data_fim" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Quantidade</label>
          <input type="number" name="quantidade" class="form-control" value="1" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Valor total (R$)</label>
          <input type="number" name="valor_total" class="form-control font-mono" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="status" class="form-control">
            {% for v, l in [('rascunho','Rascunho'),('pronto','Pronto'),('enviado','Enviado')] %}
            <option value="{{ v }}">{{ l }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Justificativa clínica</label>
          <textarea name="justificativa" class="form-control" rows="3"></textarea>
        </div>
      </div>
    </div>
    <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
      <a href="{{ url_for('faturamento.apac_lista') }}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary">Criar APAC</button>
    </div>
  </div>
</form>
</div>
{% endblock %}
