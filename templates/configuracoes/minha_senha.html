{% extends "base.html" %}
{% block title %}Alterar Senha{% endblock %}
{% block page_title %}Alterar Minha Senha{% endblock %}

{% block content %}
<div style="max-width:420px">
  <form method="POST">
    <div class="card">
      <div class="card-header">
        <svg width="17" height="17" fill="none" stroke="var(--sus-azul)" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
        <h3>Alterar Senha</h3>
      </div>
      <div class="card-body">
        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label">Senha atual <span class="obrigatorio">*</span></label>
          <input type="password" name="senha_atual" class="form-control" required autofocus>
        </div>
        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label">Nova senha <span class="obrigatorio">*</span></label>
          <input type="password" name="nova_senha" class="form-control"
                 placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar nova senha <span class="obrigatorio">*</span></label>
          <input type="password" name="confirma_senha" class="form-control" required minlength="6">
        </div>
      </div>
      <div class="card-footer" style="display:flex;justify-content:flex-end;gap:12px">
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Alterar Senha
        </button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
