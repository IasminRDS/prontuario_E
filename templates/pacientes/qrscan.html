{% extends "base.html" %}
{% block title %}Busca por QR Code{% endblock %}
{% block page_title %}Busca por QR Code / Código de Barras{% endblock %}

{% block content %}
<style>
  .qr-page{
    min-height: calc(100vh - 62px - 32px); /* topbar + paddings aproximados */
    display:flex;
    align-items:center;      /* centraliza vertical */
    justify-content:center;  /* centraliza horizontal */
  }
  .qr-wrap{
    width:100%;
    max-width:560px;
    display:grid;
    gap:12px;
  }
</style>

<div class="qr-page">
  <div class="qr-wrap">
    <div class="card">
      <div class="card-body">
        <h3 style="margin-top:0;">Câmera — QR Code / Código de Barras</h3>
        <p class="text-muted">Aguardando leitura...</p>
        <button class="btn btn-primary">Iniciar câmera</button>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h3 style="margin-top:0;">Digitar código manualmente</h3>
        <form style="display:flex;gap:8px;flex-wrap:wrap;">
          <input class="form-control" placeholder="CNS (15 dígitos), CPF ou ID" style="min-width:260px;">
          <button class="btn btn-primary" type="submit">Buscar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
