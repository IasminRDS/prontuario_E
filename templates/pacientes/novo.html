{% extends "base.html" %}
{% block title %}Novo Paciente{% endblock %}
{% block page_title %}Novo Paciente{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('pacientes.index') }}" class="btn btn-secondary">Voltar</a>
{% endblock %}

{% block content %}
<div style="max-width:880px">
  <div class="card">
    <div class="card-header">
      <h3>Cadastro de Paciente</h3>
    </div>

    <div class="card-body">
      <form id="form-paciente" method="post" action="{{ url_for('pacientes.criar_paciente') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label class="form-label">Nome <span class="obrigatorio">*</span></label>
            <input type="text" name="nome" id="nome" class="form-control" required>
          </div>

          <div class="form-group">
            <label class="form-label">CPF</label>
            <input type="text" name="cpf" id="cpf" class="form-control font-mono" placeholder="000.000.000-00">
          </div>

          <div class="form-group">
            <label class="form-label">CNS</label>
            <input type="text" name="cns" id="cns" class="form-control font-mono" placeholder="000 0000 0000 000">
          </div>

          <div class="form-group">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" name="data_nascimento" id="data_nascimento" class="form-control">
          </div>
        </div>

        <div style="margin-top:16px;display:flex;gap:10px">
          <button type="submit" class="btn btn-primary">Salvar</button>
          <a href="{{ url_for('pacientes.index') }}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>

      <div id="msg" style="margin-top:12px"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const form = document.getElementById('form-paciente');
const msg = document.getElementById('msg');

function limparNumero(v){ return (v || '').replace(/\D/g, ''); }

form.addEventListener('submit', async function(e){
  e.preventDefault();

  const payload = {
    nome: document.getElementById('nome').value.trim(),
    cpf: limparNumero(document.getElementById('cpf').value),
    cns: limparNumero(document.getElementById('cns').value),
    data_nascimento: document.getElementById('data_nascimento').value || null
  };

  try {
    const r = await fetch("{{ url_for('pacientes.criar_paciente') }}", {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok) {
      msg.innerHTML = `<div class="alert alert-danger">${data.erro || 'Erro ao salvar paciente.'}</div>`;
      return;
    }

    msg.innerHTML = `<div class="alert alert-success">Paciente cadastrado com sucesso!</div>`;
    setTimeout(() => {
      window.location.href = "{{ url_for('pacientes.index') }}";
    }, 700);
  } catch (err) {
    msg.innerHTML = `<div class="alert alert-danger">Falha de rede ao salvar.</div>`;
  }
});
</script>
{% endblock %}
